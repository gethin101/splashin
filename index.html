<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splashin Login</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .login-box {
            background: #1a1a1a;
            padding: 40px;
            width: 90%;
            max-width: 420px;
            border-radius: 14px;
            box-shadow: 0 6px 30px rgba(0,0,0,0.4);
            text-align: center;
        }

        h2 {
            margin-bottom: 25px;
            font-weight: 700;
            color: #ffffff;
            font-size: 30px;
        }

        input {
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            border-radius: 10px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: white;
            font-size: 18px;
        }

        input::placeholder {
            color: #888;
        }

        button {
            width: 100%;
            padding: 16px;
            background: #4a6cf7;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: 600;
        }

        button:hover {
            background: #3c59d4;
        }

        .error {
            color: #ff4d4d;
            margin-top: 12px;
            font-size: 16px;
        }

        @media (max-width: 400px) {
            .login-box {
                padding: 30px;
            }

            input, button {
                font-size: 17px;
                padding: 14px;
            }
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2>Splashin Login</h2>

        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">Login</button>

        <div id="error" class="error"></div>
    </div>

    <!-- Firebase -->
    <script type="module">
        const firebaseConfig = {
          apiKey: "AIzaSyBYNiqTUUJtRHLM-9KWcRkRWxvbgo1JL8M",
          authDomain: "splashin-game.firebaseapp.com",
          projectId: "splashin-game",
          storageBucket: "splashin-game.appspot.com",
          messagingSenderId: "288041679813",
          appId: "1:288041679813:web:381e2b17ff1a3779b829ac"
        };

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function login() {
            const user = document.getElementById("username").value.trim();
            const pass = document.getElementById("password").value.trim();
            const errorBox = document.getElementById("error");

            errorBox.textContent = "";

            try {
                const playersRef = collection(db, "players");
                const snapshot = await getDocs(playersRef);

                let found = false;

                snapshot.forEach(doc => {
                    const data = doc.data();

                    if (data.username === user && data.password === pass) {
                        found = true;

                        if (data.role === "admin") {
                            window.location.href = "admin.html";
                        } else {
                            localStorage.setItem("playerId", doc.id);
                            window.location.href = "player.html";
                        }
                    }
                });

                if (!found) {
                    errorBox.textContent = "Incorrect username or password.";
                }

            } catch (err) {
                console.error("Firestore error:", err);
                errorBox.textContent = "Database error — check console.";
            }
        }

        // Allow pressing Enter to log in
        window.addEventListener("keydown", (e) => {
            if (e.key === "Enter") login();
        });

        // Make login() available to the button
        window.login = login;
    </script>

</body>
</html>
