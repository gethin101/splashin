<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
        }

        .header {
            text-align: center;
            padding: 25px 10px;
            font-size: 34px;
            font-weight: 800;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: #1a1a1a;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 6px 30px rgba(0,0,0,0.4);
            margin-bottom: 25px;
        }

        .card h2 {
            margin-top: 0;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        button {
            padding: 14px 20px;
            background: #4a6cf7;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            margin: 8px 0;
            width: 100%;
            font-weight: 600;
        }

        button:hover {
            background: #3c59d4;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 14px;
            border-bottom: 1px solid #333;
            text-align: left;
            font-size: 18px;
        }

        th {
            background: #2a2a2a;
            font-weight: 700;
        }

        tr:nth-child(even) {
            background: #1f1f1f;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 16px;
            color: white;
            font-weight: 600;
        }

        .alive { background: #4caf50; }
        .dead { background: #e53935; }

        .action-btn {
            background: #e53935;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            color: white;
            font-weight: 600;
        }

        .action-btn:hover {
            background: #c62828;
        }

        @media (max-width: 700px) {
            th, td {
                font-size: 15px;
                padding: 10px;
            }

            button {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

    <div class="header">Admin Dashboard</div>

    <div class="container">

        <!-- Round Controls -->
        <div class="card">
            <h2>Round Controls</h2>
            <button onclick="startRound()">Start Round</button>
            <button onclick="stopRound()">Stop Round</button>
        </div>

        <!-- Target Assignment -->
        <div class="card">
            <h2>Assign Targets</h2>
            <button onclick="assignTargets()">Assign Random Targets</button>
        </div>

        <!-- Reset Game -->
        <div class="card">
            <h2>Reset Game</h2>
            <button onclick="resetGame()">Reset All Players</button>
        </div>

        <!-- Player List -->
        <div class="card">
            <h2>Players</h2>

            <table id="playersTable">
                <tr>
                    <th>Username</th>
                    <th>Target</th>
                    <th>Status</th>
                    <th>Elims</th>
                    <th>Action</th>
                </tr>
            </table>
        </div>

    </div>

    <!-- Firebase -->
    <script type="module">
        const firebaseConfig = {
          apiKey: "AIzaSyBYNiqTUUJtRHLM-9KWcRkRWxvbgo1JL8M",
          authDomain: "splashin-game.firebaseapp.com",
          projectId: "splashin-game",
          storageBucket: "splashin-game.appspot.com",
          messagingSenderId: "288041679813",
          appId: "1:288041679813:web:381e2b17ff1a3779b829ac"
        };

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getFirestore, collection, getDocs, doc, updateDoc 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadPlayers() {
            const table = document.getElementById("playersTable");
            const snapshot = await getDocs(collection(db, "players"));

            snapshot.forEach(playerDoc => {
                const p = playerDoc.data();

                const row = document.createElement("tr");

                row.innerHTML = `
                    <td>${p.username}</td>
                    <td>${p.target || "-"}</td>
                    <td>
                        <span class="status-badge ${p.eliminated ? 'dead' : 'alive'}">
                            ${p.eliminated ? "Eliminated" : "Alive"}
                        </span>
                    </td>
                    <td>${p.elims}</td>
                    <td>
                        <button class="action-btn" onclick="markEliminated('${playerDoc.id}')">Eliminate</button>
                    </td>
                `;

                table.appendChild(row);
            });
        }

        async function markEliminated(id) {
            await updateDoc(doc(db, "players", id), {
                eliminated: true
            });
            alert("Player marked as eliminated.");
            location.reload();
        }

        async function startRound() {
            await updateDoc(doc(db, "game", "state"), {
                roundActive: true
            });
            alert("Round started!");
        }

        async function stopRound() {
            await updateDoc(doc(db, "game", "state"), {
                roundActive: false
            });
            alert("Round stopped!");
        }

        async function resetGame() {
            const snapshot = await getDocs(collection(db, "players"));
            snapshot.forEach(async playerDoc => {
                await updateDoc(doc(db, "players", playerDoc.id), {
                    eliminated: false,
                    elims: 0,
                    target: "",
                    eliminatedBy: ""
                });
            });

            await updateDoc(doc(db, "game", "state"), {
                roundActive: false,
                winner: ""
            });

            alert("Game reset!");
            location.reload();
        }

        async function assignTargets() {
            const snapshot = await getDocs(collection(db, "players"));
            const players = [];

            snapshot.forEach(doc => {
                players.push({ id: doc.id, ...doc.data() });
            });

            players.sort(() => Math.random() - 0.5);

            for (let i = 0; i < players.length; i++) {
                const target = players[(i + 1) % players.length];
                await updateDoc(doc(db, "players", players[i].id), {
                    target: target.username
                });
            }

            alert("Targets assigned!");
            location.reload();
        }

        loadPlayers();
    </script>

</body>
</html>
