<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white}
.header{text-align:center;padding:25px;font-size:34px;font-weight:800}
.container{max-width:1000px;margin:auto;padding:20px}
.card{background:#1a1a1a;padding:25px;border-radius:14px;margin-bottom:25px}
button{padding:14px;background:#4a6cf7;border:none;border-radius:10px;color:white;font-size:18px;margin:6px 0;width:100%;cursor:pointer}
table{width:100%;border-collapse:collapse;margin-top:15px}
th,td{padding:14px;border-bottom:1px solid #333;font-size:18px}
th{background:#2a2a2a}
.status-badge{padding:6px 12px;border-radius:8px;font-size:16px;font-weight:600}
.alive{background:#4caf50}
.dead{background:#e53935}
.action-btn{padding:10px;border-radius:8px;border:none;color:white;font-weight:600}
.elim-btn{background:#e53935}
.elim-number-btn{background:#4a6cf7;padding:8px 14px;border-radius:8px;border:none;color:white;font-weight:700;cursor:pointer}

.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center}
.modal-box{background:#1a1a1a;padding:25px;width:90%;max-width:420px;border-radius:14px;text-align:center}
.modal-input{width:100%;padding:10px;border-radius:8px;border:2px solid #444;background:#111;color:white;font-size:16px;margin-bottom:15px}
.modal-btn{padding:12px 18px;border-radius:10px;border:none;font-size:18px;margin:5px}
.modal-no{background:#e53935}
.modal-yes{background:#4caf50}
</style>
</head>

<body>

<div class="header">Admin Dashboard</div>

<div class="container">

<div class="card">
<h2>Round Controls</h2>
<button onclick="openConfirm('startRound')">Start Round</button>
<button onclick="openConfirm('pauseRound')">Pause / Resume</button>
<button onclick="openConfirm('stopRound')">Stop Round</button>
</div>

<div class="card">
<h2>Reset Controls</h2>
<button onclick="openConfirm('resetElims')">Reset Eliminations</button>
<button onclick="openConfirm('resetTargets')">Reset Targets</button>
<button onclick="openConfirm('resetStatus')">Reset Status</button>
<button onclick="openConfirm('resetWinner')">Reset Winner</button>
</div>

<div class="card">
<h2>Players</h2>

<table id="playersTable">
<tr>
<th>Username</th>
<th>Target</th>
<th>Status</th>
<th>Elims</th>
<th>Action</th>
</tr>
</table>

</div>

</div>

<div class="modal-bg" id="modalBg">
<div class="modal-box">

<div id="modalTitle">Confirm</div>

<input id="modalInput" class="modal-input" style="display:none">

<div>
<button class="modal-btn modal-no" onclick="closeModal()">No</button>
<button class="modal-btn modal-yes" onclick="confirmModal()">Yes</button>
</div>

</div>
</div>

<script type="module">

const firebaseConfig={
apiKey:"YOURKEY",
authDomain:"splashin-game.firebaseapp.com",
projectId:"splashin-game",
storageBucket:"splashin-game.appspot.com",
messagingSenderId:"288041679813",
appId:"1:288041679813:web:381e2b17ff1a3779b829ac"
}

import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"
import{getFirestore,collection,getDocs,doc,updateDoc,setDoc,getDoc,onSnapshot}
from"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)

let modalMode=null
let modalPlayerId=null
let pendingAction=null

async function loadPlayers(){

const table=document.getElementById("playersTable")

table.innerHTML=`
<tr>
<th>Username</th>
<th>Target</th>
<th>Status</th>
<th>Elims</th>
<th>Action</th>
</tr>`

const snapshot=await getDocs(collection(db,"players"))

snapshot.forEach(playerDoc=>{

const p=playerDoc.data()
if(p.role==="admin")return

const row=document.createElement("tr")

const statusClass=p.eliminated?"dead":"alive"
const statusText=p.eliminated?"Eliminated":"Alive"

row.innerHTML=`

<td>${p.username}</td>

<td>
<button class="elim-number-btn" onclick="openTargetEditModal('${playerDoc.id}','${p.target||""}')">
${p.target||"-"}
</button>
</td>

<td>
<span class="status-badge ${statusClass}">
${statusText}
</span>
</td>

<td>
<button class="elim-number-btn" onclick="openElimEditModal('${playerDoc.id}',${p.elims})">
${p.elims}
</button>
</td>

<td>
${p.eliminated?"":`
<button class="action-btn elim-btn" onclick="openElimModal('${playerDoc.id}')">
Eliminate
</button>`}
</td>
`

table.appendChild(row)

})

}

async function doStartRound(){

const stateRef=doc(db,"game","state")
const stateSnap=await getDoc(stateRef)

if(stateSnap.exists()&&stateSnap.data().roundActive){
alert("Round already active")
return
}

await setDoc(stateRef,{roundActive:true,roundPause:false,winner:""},{merge:true})

const snapshot=await getDocs(collection(db,"players"))
const players=[]

snapshot.forEach(docSnap=>{
const d=docSnap.data()
if(d.role!=="admin"&&!d.eliminated){
players.push({id:docSnap.id,...d})
}
})

players.sort(()=>Math.random()-.5)

for(let i=0;i<players.length;i++){
const target=players[(i+1)%players.length]
await updateDoc(doc(db,"players",players[i].id),{target:target.username})
}

}

async function doPauseRound(){

const stateRef=doc(db,"game","state")
const snap=await getDoc(stateRef)

let paused=false
if(snap.exists())paused=!!snap.data().roundPause

await setDoc(stateRef,{roundPause:!paused},{merge:true})

}

async function doStopRound(){
await setDoc(doc(db,"game","state"),{roundActive:false},{merge:true})
}

async function checkWinner(){

const snapshot=await getDocs(collection(db,"players"))
const alive=[]

snapshot.forEach(docSnap=>{
const d=docSnap.data()
if(d.role!=="admin"&&!d.eliminated){
alive.push(d.username)
}
})

if(alive.length===1){
await setDoc(doc(db,"game","state"),{winner:alive[0],roundActive:false},{merge:true})
}

}

window.openConfirm=function(action){
modalMode="confirmAction"
pendingAction=action
document.getElementById("modalBg").style.display="flex"
}

window.openTargetEditModal=function(id,target){
modalMode="editTarget"
modalPlayerId=id
const input=document.getElementById("modalInput")
input.style.display="block"
input.value=target
document.getElementById("modalBg").style.display="flex"
}

window.openElimEditModal=function(id,elims){
modalMode="editElims"
modalPlayerId=id
const input=document.getElementById("modalInput")
input.style.display="block"
input.value=elims
document.getElementById("modalBg").style.display="flex"
}

window.openElimModal=function(id){
modalMode="eliminate"
modalPlayerId=id
document.getElementById("modalBg").style.display="flex"
}

window.closeModal=function(){
document.getElementById("modalBg").style.display="none"
}

window.confirmModal=async function(){

const input=document.getElementById("modalInput")

if(modalMode==="editTarget"){
await updateDoc(doc(db,"players",modalPlayerId),{target:input.value.trim()})
closeModal()
return
}

if(modalMode==="editElims"){
await updateDoc(doc(db,"players",modalPlayerId),{elims:parseInt(input.value)||0})
closeModal()
return
}

if(modalMode==="confirmAction"){

closeModal()

if(pendingAction==="startRound")await doStartRound()
if(pendingAction==="pauseRound")await doPauseRound()
if(pendingAction==="stopRound")await doStopRound()

}

if(modalMode==="eliminate"){

const snapshot=await getDocs(collection(db,"players"))

let victim=null
let hunter=null

snapshot.forEach(docSnap=>{
const d=docSnap.data()
if(docSnap.id===modalPlayerId)victim={id:docSnap.id,...d}
})

snapshot.forEach(docSnap=>{
const d=docSnap.data()
if(victim&&d.target===victim.username)hunter={id:docSnap.id,...d}
})

if(victim){

await updateDoc(doc(db,"players",victim.id),{
eliminated:true,
eliminatedBy:"Admin",
target:""
})

if(hunter&&victim.target){
await updateDoc(doc(db,"players",hunter.id),{target:victim.target})
}

}

await checkWinner()

closeModal()

}

}

onSnapshot(collection(db,"players"),()=>{loadPlayers()})

</script>

</body>
</html>
