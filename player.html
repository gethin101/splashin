<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player Dashboard</title>

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white}
.header{text-align:center;padding:25px;font-size:34px;font-weight:800}
.pauseBanner{display:none;background:#ff9800;color:black;text-align:center;padding:14px;font-size:22px;font-weight:700}
.center{max-width:600px;margin:auto;padding:20px;text-align:center}
button{padding:20px;border:none;border-radius:12px;font-size:22px;font-weight:700;cursor:pointer}
.target-btn{background:#4a6cf7;color:white;width:100%;margin-bottom:20px}
.elim-btn{background:#4a6cf7;color:white;width:100%;display:none}
.target-box{background:#2a2a2a;padding:30px;border-radius:12px;display:none;font-size:26px}
</style>
</head>

<body>

<div class="header" id="headerName">Player Dashboard</div>

<div id="pauseBanner" class="pauseBanner">
GAME PAUSED
</div>

<div class="center">

<button id="targetBtn" class="target-btn" onclick="toggleTarget()">
Reveal Target
</button>

<div id="targetDisplay" class="target-box">

<span id="targetName">Loading...</span>

<br><br>

<button id="elimBtn" class="elim-btn" onclick="confirmElimination()">
Eliminated Target
</button>

</div>

</div>

<script type="module">

const firebaseConfig={
apiKey: "AIzaSyBYNiqTUUJtRHLM-9KWcRkRWxvbgo1JL8M",
authDomain:"splashin-game.firebaseapp.com",
projectId:"splashin-game",
storageBucket:"splashin-game.appspot.com",
messagingSenderId:"288041679813",
appId:"1:288041679813:web:381e2b17ff1a3779b829ac"
}

import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"
import{getFirestore,doc,getDoc,updateDoc,collection,getDocs,onSnapshot}
from"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)

const playerId=localStorage.getItem("playerId")
if(!playerId)location.href="index.html"

let playerData=null
let gameData=null
let targetName=""

async function loadPlayer(){

const playerSnap=await getDoc(doc(db,"players",playerId))
const gameSnap=await getDoc(doc(db,"game","state"))

if(!playerSnap.exists())return

playerData=playerSnap.data()
gameData=gameSnap.exists()?gameSnap.data():{}

document.getElementById("headerName").textContent=playerData.username

targetName=playerData.target||""

document.getElementById("targetName").textContent="Target: "+(targetName||"None")

const pauseBanner=document.getElementById("pauseBanner")

if(gameData.roundPause){
pauseBanner.style.display="block"
}else{
pauseBanner.style.display="none"
}

}

window.toggleTarget=function(){

const box=document.getElementById("targetDisplay")
const btn=document.getElementById("targetBtn")
const elimBtn=document.getElementById("elimBtn")

if(box.style.display==="none"||box.style.display===""){

box.style.display="block"

const canKill=
playerData &&
!playerData.eliminated &&
gameData &&
gameData.roundActive &&
!gameData.roundPause &&
targetName

if(canKill){
elimBtn.style.display="block"
elimBtn.textContent="Eliminated Target"
}else if(gameData.roundPause){
elimBtn.style.display="block"
elimBtn.textContent="PAUSED"
}

btn.textContent="Hide Target"

}else{

box.style.display="none"
elimBtn.style.display="none"
btn.textContent="Reveal Target"

}

}

window.confirmElimination=async function(){

if(!targetName)return
if(gameData.roundPause)return

const snapshot=await getDocs(collection(db,"players"))

let victimId=null
let victimData=null

snapshot.forEach(docSnap=>{
const d=docSnap.data()
if(d.username===targetName){
victimId=docSnap.id
victimData=d
}
})

if(!victimId)return

await updateDoc(doc(db,"players",victimId),{
eliminated:true,
eliminatedBy:playerData.username,
target:""
})

const newTarget=victimData.target||""

await updateDoc(doc(db,"players",playerId),{
elims:(playerData.elims||0)+1,
target:newTarget
})

}

onSnapshot(doc(db,"players",playerId),()=>{loadPlayer()})
onSnapshot(doc(db,"game","state"),()=>{loadPlayer()})

</script>

</body>
</html>
