<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Dashboard</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
        }

        .header {
            text-align: center;
            padding: 25px 10px;
            font-size: 34px;
            font-weight: 800;
        }

        .layout {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 25px;
            padding: 20px;
            flex-wrap: wrap;
        }

        .side-box {
            background: #1a1a1a;
            padding: 25px;
            width: 260px;
            min-height: 650px;
            border-radius: 14px;
            box-shadow: 0 6px 30px rgba(0,0,0,0.4);
        }

        .side-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
        }

        .side-info {
            font-size: 20px;
            margin: 15px 0;
        }

        /* Leaderboard */
        .leaderboard {
            margin-top: 25px;
        }

        .leaderboard-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 15px;
            text-align: center;
        }

        .leaderboard-item {
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 8px;
            background: #2a2a2a;
            font-size: 18px;
        }

        .gold { background: #d4af37; color: black; font-weight: 700; }
        .silver { background: #c0c0c0; color: black; font-weight: 700; }
        .bronze { background: #cd7f32; color: black; font-weight: 700; }

        .center-box {
            background: #1a1a1a;
            padding: 30px;
            width: 90%;
            max-width: 550px;
            border-radius: 14px;
            text-align: center;
            box-shadow: 0 6px 30px rgba(0,0,0,0.4);
            min-height: 650px;
        }

        .profile-box {
            width: 100%;
            max-width: 300px;
            height: 300px;
            background: #2a2a2a;
            border-radius: 12px;
            margin: 0 auto 30px auto;
            overflow: hidden;
        }

        .profile-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .target-btn {
            width: 100%;
            padding: 20px;
            background: #4a6cf7;
            border: none;
            border-radius: 12px;
            font-size: 24px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            margin-bottom: 25px;
        }

        .target-display {
            margin-top: 20px;
            padding: 30px;
            background: #2a2a2a;
            border-radius: 12px;
            font-size: 28px;
            font-weight: 700;
            display: none;
            min-height: 120px;
        }

        .badge {
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 18px;
            color: white;
            display: inline-block;
            margin-top: 5px;
        }

        .alive { background: #4caf50; }
        .dead { background: #e53935; }
        .active { background: #4a6cf7; }
        .inactive { background: #777; }

        .time-box {
            margin-top: 20px;
            padding: 15px;
            background: #2a2a2a;
            border-radius: 10px;
            text-align: center;
            font-size: 20px;
        }

        @media (max-width: 900px) {
            .layout {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>

<body>

    <div class="header" id="headerName">Player Dashboard</div>

    <div class="layout">

        <!-- LEFT SIDE -->
        <div class="side-box">
            <div class="side-title">Player Info</div>

            <p class="side-info"><strong>Username:</strong> <span id="username">Loading...</span></p>
            <p class="side-info"><strong>Eliminations:</strong> <span id="elims">0</span></p>

            <!-- LEADERBOARD -->
            <div class="leaderboard">
                <div class="leaderboard-title">Elimination Leaderboard</div>
                <div id="leaderboardList"></div>
            </div>
        </div>

        <!-- CENTER -->
        <div class="center-box">

            <div class="profile-box">
                <img src="assets/profile.png" alt="Profile">
            </div>

            <button id="targetBtn" class="target-btn" onclick="toggleTarget()">Reveal Target</button>

            <div id="targetDisplay" class="target-display">Target: Loading...</div>
        </div>

        <!-- RIGHT SIDE -->
        <div class="side-box">
            <div class="side-title">Game Status</div>

            <p class="side-info">
                <strong>Status:</strong>
                <span id="statusBadge" class="badge">Loading...</span>
            </p>

            <p class="side-info">
                <strong>Round:</strong>
                <span id="roundBadge" class="badge">Loading...</span>
            </p>

            <div class="time-box" id="timeBox">Time: --:--:--</div>
        </div>

    </div>

    <!-- Firebase -->
    <script type="module">
        const firebaseConfig = {
          apiKey: "AIzaSyBYNiqTUUJtRHLM-9KWcRkRWxvbgo1JL8M",
          authDomain: "splashin-game.firebaseapp.com",
          projectId: "splashin-game",
          storageBucket: "splashin-game.appspot.com",
          messagingSenderId: "288041679813",
          appId: "1:288041679813:web:381e2b17ff1a3779b829ac"
        };

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const playerId = localStorage.getItem("playerId");
        if (!playerId) window.location.href = "index.html";

        async function loadPlayer() {
            const playerRef = doc(db, "players", playerId);
            const playerSnap = await getDoc(playerRef);

            const gameRef = doc(db, "game", "state");
            const gameSnap = await getDoc(gameRef);

            if (!playerSnap.exists()) return alert("Player not found.");

            const p = playerSnap.data();
            const g = gameSnap.data();

            document.getElementById("username").textContent = p.username;
            document.getElementById("headerName").textContent = p.username + " Dashboard";
            document.getElementById("elims").textContent = p.elims;

            document.getElementById("targetDisplay").textContent = "Target: " + (p.target || "Not assigned yet");

            const statusBadge = document.getElementById("statusBadge");
            statusBadge.textContent = p.eliminated ? "Eliminated" : "Alive";
            statusBadge.className = "badge " + (p.eliminated ? "dead" : "alive");

            const roundBadge = document.getElementById("roundBadge");
            roundBadge.textContent = g.roundActive ? "Active" : "Not Active";
            roundBadge.className = "badge " + (g.roundActive ? "active" : "inactive");
        }

        async function loadLeaderboard() {
            const list = document.getElementById("leaderboardList");
            list.innerHTML = "";

            const snapshot = await getDocs(collection(db, "players"));
            const players = [];

            snapshot.forEach(doc => {
                const d = doc.data();
                players.push({ username: d.username, elims: d.elims });
            });

            players.sort((a, b) => b.elims - a.elims);

            players.forEach((p, i) => {
                const div = document.createElement("div");
                div.classList.add("leaderboard-item");

                if (i === 0) div.classList.add("gold");
                else if (i === 1) div.classList.add("silver");
                else if (i === 2) div.classList.add("bronze");

                div.textContent = `${p.username}: ${p.elims}`;
                list.appendChild(div);
            });
        }

        loadPlayer();
        loadLeaderboard();

        window.toggleTarget = function () {
            const box = document.getElementById("targetDisplay");
            const btn = document.getElementById("targetBtn");

            if (box.style.display === "none" || box.style.display === "") {
                box.style.display = "block";
                btn.textContent = "Hide Target";
                btn.style.background = "#e53935";
            } else {
                box.style.display = "none";
                btn.textContent = "Reveal Target";
                btn.style.background = "#4a6cf7";
            }
        };

        function updateTime() {
            const now = new Date();
            document.getElementById("timeBox").textContent =
                "Time: " + now.toLocaleTimeString("en-GB", { hour12: false });
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>

</body>
</html>
